{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card shadow-sm">
                {% if post.image %}
                <img src="{{ post.image.url }}" class="card-img-top" style="max-height: 400px; object-fit: cover;">
                {% endif %}
                <div class="card-body">
                    <h1 class="card-title">{{ post.title }}</h1>
                    <p class="text-muted">
                        <i class="fas fa-user"></i> By {{ post.author.username }} | 
                        <i class="fas fa-calendar"></i> {{ post.created_at|date:"F d, Y" }} | 
                        <i class="fas fa-eye"></i> {{ post.views }} views
                    </p>
                    <hr>
                    <div class="blog-content">
                        {{ post.content|linebreaks }}
                    </div>
                    <hr>
                    
                    <!-- Share Buttons -->
                    <div class="share-buttons mt-3">
                        <label><strong>Share this post:</strong></label>
                        <a href="https://www.facebook.com/sharer/sharer.php?u={{ request.build_absolute_uri }}" target="_blank" class="btn btn-sm btn-outline-primary"><i class="fab fa-facebook-f"></i> Facebook</a>
                        <a href="https://twitter.com/intent/tweet?url={{ request.build_absolute_uri }}" target="_blank" class="btn btn-sm btn-outline-info"><i class="fab fa-twitter"></i> Twitter</a>
                        <a href="https://wa.me/?text={{ request.build_absolute_uri }}" target="_blank" class="btn btn-sm btn-outline-success"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                    </div>
                    
                    <div class="mt-4">
                        <a href="{% url 'blog_list' %}" class="btn btn-secondary">← Back to Blog</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
