{% extends 'base.html' %}

{% block content %}
<div class="container mt-5"><div class="row justify-content-center"><div class="col-md-6"><div class="card shadow"><div class="card-header bg-primary text-white text-center"><h4>Register as {{ role }}</h4></div><div class="card-body"><form method="POST">{% csrf_token %}{% for field in form %}<div class="mb-2"><label>{{ field.label }}</label>{{ field }}{% if field.errors %}<small class="text-danger">{{ field.errors }}</small>{% endif %}</div>{% endfor %}<button type="submit" class="btn btn-primary w-100">Register</button></form><hr><p class="text-center">Already have an account? <a href="{% url 'login' %}">Login</a></p></div></div></div></div></div>
<style>input,select,textarea{width:100%;padding:8px;border:1px solid #ddd;border-radius:5px;}</style>
{% endblock %}
