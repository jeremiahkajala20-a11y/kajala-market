{% extends 'base.html' %}

{% block content %}
<div class="container mt-5"><div class="row justify-content-center"><div class="col-md-5"><div class="card shadow"><div class="card-header bg-primary text-white text-center"><h4>Login</h4></div><div class="card-body"><form method="POST">{% csrf_token %}<div class="mb-3"><label>Username</label><input type="text" name="username" class="form-control" required></div><div class="mb-3"><label>Password</label><input type="password" name="password" class="form-control" required></div><button type="submit" class="btn btn-primary w-100">Login</button></form><hr><p class="text-center">Don't have an account? <a href="{% url 'register_buyer' %}">Register</a></p></div></div></div></div></div>
{% endblock %}
