{% extends 'base.html' %}

{% block content %}
<div class="container mt-4"><div class="row"><div class="col-md-4"><div class="card text-center"><div class="card-body"><i class="fas fa-user-circle fa-5x text-primary"></i><h4>{{ user.username }}</h4><p class="text-muted">{{ user.role|title }}</p><span class="badge bg-primary">{{ user.role }}</span></div></div></div>
<div class="col-md-8"><div class="card"><div class="card-header bg-primary text-white"><h5>Account Information</h5></div><div class="card-body"><table class="table"><tr><th>Username:</th><td>{{ user.username }}</td></tr><tr><th>Email:</th><td>{{ user.email }}</td></tr><tr><th>Phone:</th><td>{{ user.phone|default:"Not set" }}</td></tr><tr><th>Joined:</th><td>{{ user.date_joined|date:"F d, Y" }}</td></tr></table></div></div></div></div>
</div>
{% endblock %}
