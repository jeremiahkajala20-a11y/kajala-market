{% extends 'base.html' %}

{% block content %}
<div class="container mt-4"><div class="row justify-content-center"><div class="col-md-8"><div class="card"><div class="card-header bg-primary text-white"><h4>Add New Product</h4></div><div class="card-body"><form method="POST" enctype="multipart/form-data">{% csrf_token %}{% for field in form %}<div class="mb-2"><label>{{ field.label }}</label>{{ field }}{% if field.help_text %}<small class="text-muted">{{ field.help_text }}</small>{% endif %}{% if field.errors %}<div class="text-danger">{{ field.errors }}</div>{% endif %}</div>{% endfor %}<button type="submit" class="btn btn-primary w-100">Submit Product</button></form></div></div></div></div></div>
<style>input,select,textarea{width:100%;padding:8px;border:1px solid #ddd;border-radius:5px;}</style>
{% endblock %}
